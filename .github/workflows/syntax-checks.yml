name: Syntax Checks

on:
  push:
    branches: [main]
    paths:
      - 'scripts/*.sh'
      - 'scripts/*.ps1'
      - 'compose*.yml'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/*.sh'
      - 'scripts/*.ps1'
      - 'compose*.yml'
  workflow_dispatch:

jobs:
  shellcheck:
    name: ShellCheck (.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          severity: warning
          format: gcc

  psscriptanalyzer:
    name: PSScriptAnalyzer (.ps1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PowerShell
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq powershell
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          $results = Invoke-ScriptAnalyzer -Path ./scripts/ -Recurse -Severity @('Error', 'Warning')
          if ($results) {
            $results | Format-Table -AutoSize
            $errors = $results | Where-Object Severity -eq 'Error'
            if ($errors) { exit 1 }
          }

  yamllint:
    name: YAML Lint (compose*.yml)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: sudo apt-get install -y -qq yamllint
      - name: Lint compose files
        run: yamllint compose.yml compose-cloudflared.yml

  shellcheck-server:
    name: ShellCheck (root scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck on root .sh files
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./
          severity: warning
          format: gcc
          ignore: node_modules
          ignore_paths: >
            ./scripts
            ./docs
            ./.git
